---
name: CI

on:
  push: {}
  pull_request: {}

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ledger_app   # standardised DB name
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U $POSTGRES_USER"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ledger_app
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Cache virtualenv
        id: venv-cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-venv-

      - name: Create and install dependencies if cache miss
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv sync

      - name: Confirm Python version
        run: .venv/bin/python --version

      - name: Style and Lint Validation (Black, isort, Flake8)
        continue-on-error: true
        run: |
          .venv/bin/black . --exclude=.venv --check --diff
          .venv/bin/isort . --skip .venv --check --diff
          .venv/bin/python -m flake8 . --exclude=.venv

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize schema
        run: |
          psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -f src/schema.sql
          psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -f src/projection_schema.sql

      - name: Seed database
        run: |
          .venv/bin/python -m src.init_db

      - name: Run pytest
        run: |
          .venv/bin/python -m pytest tests \
            --tb=short --maxfail=1 --disable-warnings -q
