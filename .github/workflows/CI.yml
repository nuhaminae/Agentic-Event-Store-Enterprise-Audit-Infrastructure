---
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  actions: read

jobs:
  lint:
    runs-on: windows-latest
    continue-on-error: true   # <-- allows lint job to fail without failing workflow
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Cache virtualenv
        id: venv-cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-venv-

      - name: Create virtualenv
        run: uv venv --clear

      - name: Install dependencies
        run: uv pip install .[dev] --upgrade

      - name: Confirm Python version
        run: uv run python --version

      - name: Style and Lint Validation (Black, isort, Flake8)
        run: |
          uv run black . --exclude=.venv --check --diff
          uv run isort . --skip .venv --check --diff
          uv run flake8 . --exclude=.venv

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ secrets.POSTGRES_USER }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Cache virtualenv
        id: venv-cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-venv-

      - name: Create virtualenv
        run: uv venv --clear

      - name: Install dependencies
        run: uv pip install .[dev] --upgrade

      - name: Run pytest
        run: uv run pytest tests --tb=short --maxfail=1 --disable-warnings -q
